<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery Assistant — ADK + MongoDB Atlas</title>
<style>
:root {
  --green: #00852B;
  --green-light: #E8F5E9;
  --green-dark: #005A1D;
  --grey-50: #FAFAFA;
  --grey-100: #F5F5F5;
  --grey-200: #EEEEEE;
  --grey-300: #E0E0E0;
  --grey-500: #9E9E9E;
  --grey-700: #616161;
  --grey-900: #212121;
  --blue: #1565C0;
  --amber: #F57F17;
  --red: #C62828;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background:var(--grey-50); color:var(--grey-900); height:100vh; display:flex; flex-direction:column; }

/* Header */
.header { background:var(--green); color:#fff; padding:12px 24px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.header h1 { font-size:18px; font-weight:600; }
.header .badge { background:rgba(255,255,255,.2); padding:3px 10px; border-radius:12px; font-size:12px; font-weight:500; }

/* Layout */
.main { display:flex; flex:1; overflow:hidden; }
.sidebar { width:280px; background:#fff; border-right:1px solid var(--grey-200); padding:16px; overflow-y:auto; flex-shrink:0; display:flex; flex-direction:column; gap:12px; }
.chat-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }

/* Sidebar */
.sidebar h2 { font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:var(--grey-500); margin-bottom:4px; }
.arch-flow { display:flex; flex-direction:column; gap:4px; font-size:13px; }
.arch-flow .node { background:var(--grey-100); padding:8px 12px; border-radius:6px; border-left:3px solid var(--grey-300); }
.arch-flow .node.mongo { border-left-color:var(--green); }
.arch-flow .node.gemini { border-left-color:var(--blue); }
.arch-flow .arrow { text-align:center; color:var(--grey-500); font-size:11px; }
.suggested { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
.suggested button { text-align:left; background:var(--grey-100); border:1px solid var(--grey-200); padding:8px 12px; border-radius:8px; font-size:13px; cursor:pointer; transition:all .15s; line-height:1.4; }
.suggested button:hover { background:var(--green-light); border-color:var(--green); }
.session-info { margin-top:auto; font-size:12px; color:var(--grey-500); }

/* Chat sessions list */
.new-chat-btn { background:var(--green); color:#fff; border:none; padding:9px 12px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; gap:6px; justify-content:center; }
.new-chat-btn:hover { background:var(--green-dark); }
.chat-list { display:flex; flex-direction:column; gap:4px; max-height:280px; overflow-y:auto; }
.chat-item { background:var(--grey-100); border:1px solid var(--grey-200); border-radius:8px; padding:8px 10px; font-size:13px; cursor:pointer; transition:all .15s; }
.chat-item:hover { background:var(--green-light); border-color:var(--green); }
.chat-item.active { background:var(--green-light); border-color:var(--green); }
.chat-item .ci-title { font-weight:500; line-height:1.3; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.chat-item .ci-meta { color:var(--grey-500); font-size:11px; margin-top:3px; display:flex; justify-content:space-between; }
.chat-list-empty { color:var(--grey-500); font-size:12px; font-style:italic; padding:6px 2px; }

/* Chat messages */
.messages { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:16px; }
.msg { max-width:720px; }
.msg-user { align-self:flex-end; }
.msg-agent { align-self:flex-start; width:100%; max-width:100%; }
.msg-bubble { padding:12px 16px; border-radius:16px; font-size:14px; line-height:1.6; white-space:pre-wrap; }
.msg-user .msg-bubble { background:var(--green); color:#fff; border-bottom-right-radius:4px; }
.msg-agent .msg-bubble { background:#fff; border:1px solid var(--grey-200); border-bottom-left-radius:4px; }

/* Tool indicators */
.tool-section { margin-top:8px; }
.tool-badge { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.3px; padding:3px 8px; border-radius:4px; }
.tool-badge.search { background:#E3F2FD; color:var(--blue); }
.tool-badge.memory-save { background:#FFF8E1; color:var(--amber); }
.tool-badge.memory-recall { background:#F3E5F5; color:#7B1FA2; }
.tool-badge.artifact { background:var(--green-light); color:var(--green); }

/* Product cards */
.product-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:8px; margin-top:8px; }
.product-card { background:var(--grey-50); border:1px solid var(--grey-200); border-radius:8px; padding:10px 12px; font-size:13px; }
.product-card .p-name { font-weight:600; margin-bottom:2px; }
.product-card .p-meta { color:var(--grey-700); display:flex; justify-content:space-between; }
.product-card .p-score { color:var(--green); font-weight:600; font-size:12px; }

/* Memory cards */
.memory-card { background:#FFF8E1; border:1px solid #FFE082; border-radius:6px; padding:8px 12px; margin-top:6px; font-size:13px; }

/* Input */
.input-area { border-top:1px solid var(--grey-200); padding:12px 24px; background:#fff; display:flex; gap:8px; flex-shrink:0; }
.input-area input { flex:1; padding:10px 16px; border:1px solid var(--grey-300); border-radius:24px; font-size:14px; outline:none; transition:border-color .15s; }
.input-area input:focus { border-color:var(--green); }
.input-area button { background:var(--green); color:#fff; border:none; padding:10px 20px; border-radius:24px; font-size:14px; font-weight:600; cursor:pointer; }
.input-area button:disabled { opacity:.5; cursor:not-allowed; }
.input-area button:hover:not(:disabled) { background:var(--green-dark); }

/* Loading */
.typing { display:flex; gap:4px; padding:12px 16px; }
.typing span { width:8px; height:8px; background:var(--grey-300); border-radius:50%; animation:bounce 1.4s infinite ease-in-out both; }
.typing span:nth-child(1){animation-delay:-.32s}
.typing span:nth-child(2){animation-delay:-.16s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

/* Responsive */
@media(max-width:768px) {
  .sidebar { display:none; }
  .product-grid { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <h1>Grocery Assistant</h1>
  <span class="badge">ADK + MongoDB Atlas</span>
</div>

<div class="main">
  <div class="sidebar">
    <button class="new-chat-btn" onclick="newChat()">+ New chat</button>
    <div>
      <h2>Chat Sessions</h2>
      <div class="chat-list" id="chatList">
        <div class="chat-list-empty">Loading…</div>
      </div>
    </div>
    <div>
      <h2>Demo Prompts</h2>
      <div class="suggested">
        <button onclick="sendSuggested(this)">Find me healthy lunchbox snacks under $5</button>
        <button onclick="sendSuggested(this)">I'm gluten-free and dairy-free, what can I eat?</button>
        <button onclick="sendSuggested(this)">Plan a quick weeknight dinner for 4 under $30</button>
        <button onclick="sendSuggested(this)">What's a good substitute for cream in pasta?</button>
        <button onclick="sendSuggested(this)">Build me a shopping list for a BBQ this weekend</button>
      </div>
    </div>
    <div>
      <h2>Architecture</h2>
      <div class="arch-flow">
        <div class="node">User Query</div>
        <div class="arrow">&#8595;</div>
        <div class="node gemini">Gemini 2.5 Flash (Vertex AI)</div>
        <div class="arrow">&#8595; tool calls</div>
        <div class="node mongo">MongoDB Atlas (PyMongo TLS)</div>
        <div class="arrow" style="font-size:11px">&#8593; $vectorSearch + sessions + memory</div>
      </div>
    </div>
    <div class="session-info" id="sessionInfo">No active session</div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input type="text" id="msgInput" placeholder="Ask about products, recipes, dietary needs..." autocomplete="off">
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
let userId = localStorage.getItem('groceryAssistantUserId');
if (!userId) {
  userId = 'user-' + Math.random().toString(36).slice(2,8);
  localStorage.setItem('groceryAssistantUserId', userId);
}
let sessionId = null;
const messagesEl = document.getElementById('messages');
const chatListEl = document.getElementById('chatList');
const inputEl = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');

inputEl.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) sendMessage(); });

function sendSuggested(btn) {
  inputEl.value = btn.textContent;
  sendMessage();
}

function addMsg(role, html) {
  const div = document.createElement('div');
  div.className = `msg msg-${role}`;
  div.innerHTML = html;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg msg-agent';
  div.id = 'typing';
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function updateSessionInfo() {
  const el = document.getElementById('sessionInfo');
  el.textContent = sessionId
    ? `Session: ${sessionId.slice(0,8)}…\nUser: ${userId}`
    : `User: ${userId} (new chat)`;
}

function renderAgentBody(turn) {
  let html = '';
  if (turn.text) {
    html += '<div class="msg-bubble">' + escHtml(turn.text) + '</div>';
  }

  if (turn.tool_calls && turn.tool_calls.length) {
    html += '<div class="tool-section">';
    for (const tc of turn.tool_calls) {
      const cls = tc.name === 'search_products' ? 'search'
               : tc.name === 'save_preference' ? 'memory-save'
               : tc.name === 'record_artifact' ? 'artifact' : 'search';
      const label = tc.name === 'search_products' ? 'Atlas $vectorSearch'
                 : tc.name === 'save_preference' ? 'Memory Saved'
                 : tc.name === 'record_artifact' ? 'Artifact Stored' : tc.name;
      html += `<span class="tool-badge ${cls}">${label}</span> `;
    }
    html += '</div>';
  }

  if (turn.tool_results) {
    for (const tr of turn.tool_results) {
      // search_products result is wrapped {result: [...]} from the agent tool;
      // raw replays may also pass arrays directly. Normalise.
      let products = null;
      if (tr.name === 'search_products') {
        if (Array.isArray(tr.result)) products = tr.result;
        else if (tr.result && Array.isArray(tr.result.result)) products = tr.result.result;
      }
      if (products && products.length) {
        html += '<div class="product-grid">';
        for (const p of products) {
          html += `<div class="product-card">
            <div class="p-name">${escHtml(p.name || '')}</div>
            <div class="p-meta">
              <span>${escHtml(p.category || '')} · ${escHtml(p.size || '')}</span>
              <span>$${Number(p.price).toFixed(2)}</span>
            </div>
            ${p.score ? `<div class="p-score">Relevance: ${(p.score * 100).toFixed(0)}%</div>` : ''}
          </div>`;
        }
        html += '</div>';
      }
      if (tr.name === 'save_preference' && tr.result) {
        const r = tr.result;
        html += `<div class="memory-card">Saved preference: ${escHtml(r.preference || JSON.stringify(r))}</div>`;
      }
      if (tr.name === 'record_artifact' && tr.result) {
        const r = tr.result;
        html += `<div class="memory-card" style="background:var(--green-light);border-color:#A5D6A7">Artifact stored (${escHtml(r.artifact_id || 'ok')})</div>`;
      }
    }
  }

  if (turn.memory_recalled && turn.memory_recalled.length) {
    html += '<div class="tool-section"><span class="tool-badge memory-recall">Memory Recalled</span></div>';
    for (const m of turn.memory_recalled) {
      html += `<div class="memory-card" style="background:#F3E5F5;border-color:#CE93D8">${escHtml(m.text || '')}</div>`;
    }
  }

  return html;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  sendBtn.disabled = true;

  addMsg('user', `<div class="msg-bubble">${escHtml(text)}</div>`);
  showTyping();

  try {
    const body = { user_id: userId, message: text };
    if (sessionId) body.session_id = sessionId;

    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      removeTyping();
      addMsg('agent', `<div class="msg-bubble" style="color:var(--red)">Error: ${res.status} ${res.statusText}</div>`);
      sendBtn.disabled = false;
      return;
    }

    const data = await res.json();
    const wasNew = sessionId === null;
    sessionId = data.session_id;
    updateSessionInfo();
    removeTyping();

    addMsg('agent', renderAgentBody({
      text: data.reply,
      tool_calls: data.tool_calls,
      tool_results: data.tool_results,
      memory_recalled: data.memory_recalled,
    }));

    // Refresh sidebar so the (possibly new) session appears / moves to top.
    loadChatList();
  } catch (err) {
    removeTyping();
    addMsg('agent', `<div class="msg-bubble" style="color:var(--red)">Network error: ${err.message}</div>`);
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

function newChat() {
  sessionId = null;
  messagesEl.innerHTML = '';
  document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
  updateSessionInfo();
  inputEl.focus();
}

function formatRelativeTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const diffMs = Date.now() - d.getTime();
  const m = Math.floor(diffMs / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  const days = Math.floor(h / 24);
  if (days < 7) return `${days}d ago`;
  return d.toLocaleDateString();
}

async function loadChatList() {
  try {
    const res = await fetch(`/sessions?user_id=${encodeURIComponent(userId)}`);
    if (!res.ok) {
      chatListEl.innerHTML = '<div class="chat-list-empty">Could not load chats.</div>';
      return;
    }
    const data = await res.json();
    if (!data.sessions || !data.sessions.length) {
      chatListEl.innerHTML = '<div class="chat-list-empty">No chats yet — start one below.</div>';
      return;
    }
    chatListEl.innerHTML = '';
    for (const s of data.sessions) {
      const item = document.createElement('div');
      item.className = 'chat-item' + (s.session_id === sessionId ? ' active' : '');
      item.dataset.sessionId = s.session_id;
      item.innerHTML = `
        <div class="ci-title">${escHtml(s.title)}</div>
        <div class="ci-meta">
          <span>${s.turn_count} turn${s.turn_count === 1 ? '' : 's'}</span>
          <span>${escHtml(formatRelativeTime(s.updated_at))}</span>
        </div>`;
      item.onclick = () => loadSession(s.session_id);
      chatListEl.appendChild(item);
    }
  } catch (err) {
    chatListEl.innerHTML = `<div class="chat-list-empty">Error: ${escHtml(err.message)}</div>`;
  }
}

async function loadSession(sid) {
  try {
    const res = await fetch(`/sessions/${encodeURIComponent(sid)}?user_id=${encodeURIComponent(userId)}`);
    if (!res.ok) {
      addMsg('agent', `<div class="msg-bubble" style="color:var(--red)">Could not load session: ${res.status}</div>`);
      return;
    }
    const data = await res.json();
    sessionId = data.session_id;
    messagesEl.innerHTML = '';
    for (const turn of data.turns) {
      if (turn.role === 'user') {
        addMsg('user', `<div class="msg-bubble">${escHtml(turn.text)}</div>`);
      } else {
        addMsg('agent', renderAgentBody(turn));
      }
    }
    document.querySelectorAll('.chat-item').forEach(el => {
      el.classList.toggle('active', el.dataset.sessionId === sid);
    });
    updateSessionInfo();
    inputEl.focus();
  } catch (err) {
    addMsg('agent', `<div class="msg-bubble" style="color:var(--red)">Network error: ${err.message}</div>`);
  }
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Initial load
updateSessionInfo();
loadChatList();
inputEl.focus();
</script>
</body>
</html>
